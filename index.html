<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業體育智能分組紀錄系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a73e8; }

        .main-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .nav-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 15px; }
        .nav-btn.active { background: #1a73e8; color: white; }
        .panel { display: none; }
        .panel.active { display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; position: sticky; top: 0; }

        .group-config-card { background: #fff3e0; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #ff9800; }
        .group-edit-item { display: inline-flex; align-items: center; margin-right: 15px; margin-bottom: 10px; background: white; padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd; }
        .group-edit-item input { padding: 5px; border: none; outline: none; width: 120px; font-weight: bold; }
        .icon-btn { background: #ff4d4f; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; margin-left: 5px; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s;}
        .icon-btn:hover { background: #d93025; transform: scale(1.1); }

        .smart-btn { background: linear-gradient(45deg, #9c27b0, #e91e63); color: white; padding: 12px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(233, 30, 99, 0.3); transition: 0.3s; }
        .smart-btn:hover { transform: translateY(-2px); }

        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-success { background: #34a853; color: white; }
        .btn-danger { background: #ea4335; color: white; }
        .btn-warning { background: #fbbc04; color: black; font-weight: bold; }
        
        .input-score { width: 75px; padding: 6px; border: 1px solid #aaa; border-radius: 4px; font-family: monospace; font-size: 14px; text-align: center; font-weight: bold; color: #d93025; }
        .input-score:disabled { background: #eee; color: #888; }
        
        .control-panel { display: flex; gap: 20px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 10px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 體育成績智能分組紀錄系統</h1>

    <div class="main-nav">
        <button class="nav-btn active" onclick="showPanel('import')">1. 匯入與備份</button>
        <button class="nav-btn" onclick="showPanel('groups')">2. 智能分組</button>
        <button class="nav-btn" onclick="showPanel('record')">3. 記錄成績</button>
    </div>

    <div id="panel-import" class="panel active">
        <div style="background: #e3f2fd; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
            <h3>📥 Excel / CSV 名單匯入</h3>
            <p>請選擇包含「班別」、「學號」、「中文姓名」、「性別」、「出生日期」的檔案：</p>
            <input type="file" id="excelInput" accept=".xlsx, .xls, .csv">
            <hr>
            <div id="importStatus" style="font-weight: bold; color: #1a73e8;">載入中...</div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="btn btn-danger" onclick="clearData()">🗑️ 清除所有暫存資料 (重新開始)</button>
            <button class="btn btn-success" onclick="exportToExcel()" style="font-size: 16px; padding: 10px 20px;">💾 導出最終成績至 Excel</button>
        </div>
    </div>

    <div id="panel-groups" class="panel">
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="smart-btn" onclick="smartAssignGroups()">✨ 一鍵智能分組 (按出生年份及性別)</button>
            <p style="color: #666; font-size: 0.9em; margin-top: 10px;">系統將自動提取年份及性別，建立並分配組別</p>
        </div>

        <div class="group-config-card">
            <h3>⚙️ 已建立的組別</h3>
            <div style="margin-bottom: 15px;">
                <input type="text" id="newGroupName" placeholder="輸入新組別名稱" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                <button class="btn btn-primary" onclick="addNewGroup()">+ 新增自訂組別</button>
            </div>
            <div id="groupNameEditor"></div>
        </div>

        <h3>🧑‍🤝‍🧑 學生分組名單</h3>
        <div style="margin-bottom: 10px;">
            篩選班別：<select id="assignClassFilter" onchange="renderAssignmentList()"></select>
        </div>
        <table>
            <thead>
                <tr><th>班別/學號</th><th>姓名</th><th>性別</th><th>出生日期</th><th>所屬組別</th></tr>
            </thead>
            <tbody id="assignmentList"></tbody>
        </table>
    </div>

    <div id="panel-record" class="panel">
        <div class="control-panel">
            <div>比賽項目：<select id="eventSelect" onchange="refreshRecordView()">
                <option value="28m">28米跑</option>
                <option value="60m">60米短跑</option>
                <option value="100m">100米短跑</option>
                <option value="softball">擲壘球</option>
            </select></div>
            <div>作賽組別：<select id="groupFilter" onchange="refreshRecordView()"></select></div>
            <div style="margin-left: auto;">
                <button class="btn btn-warning" onclick="manualAddStudent()">➕ 臨場新增學生</button>
            </div>
        </div>

        <table id="recordTable">
            <thead>
                <tr><th>姓名</th><th>原班別</th><th>成績 (最佳紀錄)</th><th>操作控制台</th></tr>
            </thead>
            <tbody id="recordList"></tbody>
        </table>

        <div style="margin-top: 40px; background: #fff9c4; padding: 20px; border-radius: 10px;">
            <h3>🏆 該組別 Top 8</h3>
            <table id="lbTable">
                <thead><tr><th>排名</th><th>姓名</th><th>班別</th><th>成績</th></tr></thead>
                <tbody id="lbList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let students = [];
    let groups = []; 
    let runningTimers = {};

    // --- 自動儲存系統 ---
    function saveData() {
        localStorage.setItem('sportsData_students', JSON.stringify(students));
        localStorage.setItem('sportsData_groups', JSON.stringify(groups));
    }

    function loadData() {
        const storedStudents = localStorage.getItem('sportsData_students');
        const storedGroups = localStorage.getItem('sportsData_groups');
        
        if(storedStudents) students = JSON.parse(storedStudents);
        if(storedGroups) groups = JSON.parse(storedGroups);

        // 確保舊資料也有 '28m' 的成績欄位
        students.forEach(s => {
            if (s.results && s.results['28m'] === undefined) {
                s.results['28m'] = null;
            }
        });

        if(students.length > 0 || groups.length > 0) {
            document.getElementById('importStatus').innerText = `✅ 已恢復上次未完成的自動存檔（共 ${students.length} 名學生）。如需新名單，可直接匯入覆蓋，或按下方清除資料。`;
            updateClassDropdowns();
            renderGroupEditor();
            updateGroupFilters();
        } else {
            document.getElementById('importStatus').innerText = `目前未載入任何名單。`;
        }
    }

    function clearData() {
        if(confirm("⚠️ 警告：這將會清除系統內所有學生名單及成績！確定要重新開始嗎？")) {
            students = [];
            groups = [];
            localStorage.removeItem('sportsData_students');
            localStorage.removeItem('sportsData_groups');
            alert("資料已清除！請重新匯入名單。");
            location.reload();
        }
    }

    window.onload = loadData;

    function showPanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + panelId).classList.add('active');
        event.target.classList.add('active');
        
        if(panelId === 'groups') { renderGroupEditor(); renderAssignmentList(); }
        if(panelId === 'record') { updateGroupFilters(); refreshRecordView(); }
    }

    // --- 匯入 Excel ---
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet);
            
            students = json.map(row => ({
                uid: 'U' + Date.now() + Math.floor(Math.random()*10000), 
                class: row['班別'] || '',
                no: row['學號'] || '',
                name: row['中文姓名'] || row['英文姓名'] || '',
                gender: row['性別'] || '',
                dob: row['出生日期'] || '',
                groupId: null,
                // 加入 28m 項目
                results: { '28m': null, '60m': null, '100m': null, 'softball': null }
            }));

            saveData(); 
            updateClassDropdowns();
            document.getElementById('importStatus').innerText = `✅ 成功載入 ${students.length} 名學生。請按「第二步」進行一鍵分組。`;
            document.querySelectorAll('.nav-btn')[1].click(); 
        };
        reader.readAsArrayBuffer(file);
    });

    // --- 智能分組 ---
    function smartAssignGroups() {
        if(students.length === 0) { alert("請先匯入學生名單！"); return; }
        let assignedCount = 0;

        students.forEach(s => {
            if(!s.dob || !s.gender) return; 

            let year = "";
            if (typeof s.dob === 'number') {
                const d = new Date((s.dob - 25569) * 86400 * 1000);
                year = d.getFullYear();
            } else {
                const dobStr = String(s.dob);
                const yearMatch = dobStr.match(/(201\d|202\d)/);
                if (yearMatch) year = yearMatch[1];
            }
            if (!year) return;

            let genderStr = "";
            let g = String(s.gender).toUpperCase().trim();
            if(g === 'M' || g === '男') genderStr = "男子組";
            else if(g === 'F' || g === '女') genderStr = "女子組";
            else return;

            const targetGroupName = `${year}年${genderStr}`;

            let group = groups.find(x => x.name === targetGroupName);
            if(!group) {
                group = { id: Date.now() + Math.random(), name: targetGroupName };
                groups.push(group);
            }
            s.groupId = group.id;
            assignedCount++;
        });

        groups.sort((a, b) => a.name.localeCompare(b.name));
        saveData(); 
        renderGroupEditor(); renderAssignmentList(); updateGroupFilters();
        alert(`✨ 分組成功！\n成功將 ${assignedCount} 名學生智能分配入對應的組別。`);
    }

    // --- 組別與學生清單管理 ---
    function addNewGroup() {
        const name = document.getElementById('newGroupName').value.trim();
        if(name) { groups.push({ id: Date.now(), name }); document.getElementById('newGroupName').value = ''; saveData(); renderGroupEditor(); updateGroupFilters(); }
    }
    function deleteGroup(id) {
        if(confirm("確定刪除此組別？")) {
            groups = groups.filter(g => g.id !== id);
            students.forEach(s => { if(s.groupId === id) s.groupId = null; });
            saveData(); renderGroupEditor(); updateGroupFilters(); renderAssignmentList();
        }
    }
    function updateGroupName(id, newName) {
        const g = groups.find(x => x.id === id);
        if(g) { g.name = newName; saveData(); updateGroupFilters(); }
    }
    function renderGroupEditor() {
        document.getElementById('groupNameEditor').innerHTML = groups.map(g => `
            <div class="group-edit-item">
                <input type="text" value="${g.name}" onchange="updateGroupName(${g.id}, this.value)">
                <button class="icon-btn" onclick="deleteGroup(${g.id})" title="刪除組別">✕</button>
            </div>
        `).join('');
    }

    function updateClassDropdowns() {
        const classes = [...new Set(students.map(s => s.class))].filter(Boolean).sort();
        document.getElementById('assignClassFilter').innerHTML = '<option value="">-- 請選擇班別 --</option>' + classes.map(c => `<option value="${c}">${c}</option>`).join('');
    }
    
    function renderAssignmentList() {
        const cls = document.getElementById('assignClassFilter').value;
        const filtered = students.filter(s => s.class === cls);
        document.getElementById('assignmentList').innerHTML = filtered.map(s => `
            <tr>
                <td>${s.class} (${s.no})</td><td>${s.name}</td><td>${s.gender}</td><td>${s.dob}</td>
                <td>
                    <select onchange="updateStudentGroup('${s.uid}', this.value)">
                        <option value="">-- 未分組 --</option>
                        ${groups.map(g => `<option value="${g.id}" ${s.groupId == g.id ? 'selected' : ''}>${g.name}</option>`).join('')}
                    </select>
                </td>
            </tr>
        `).join('');
    }

    function updateStudentGroup(uid, groupId) {
        const s = students.find(x => x.uid === uid);
        if(s) { s.groupId = groupId ? Number(groupId) : null; saveData(); }
    }

    // --- 臨場新增與廢除學生 ---
    function manualAddStudent() {
        const gId = document.getElementById('groupFilter').value;
        if(!gId) { alert("請先在上方選擇你要將學生加入哪一個「作賽組別」！"); return; }
        
        const name = prompt("請輸入新增學生姓名：");
        if(!name) return;
        const cls = prompt("請輸入該學生的班別 (例如 1A)：", "自訂");
        const no = prompt("請輸入該學生的學號：", "-");

        students.push({
            uid: 'U' + Date.now() + Math.floor(Math.random()*10000), 
            class: cls || '', no: no || '', name: name, gender: '', dob: '', groupId: Number(gId),
            results: { '28m': null, '60m': null, '100m': null, 'softball': null } // 加入 28m
        });
        
        saveData(); refreshRecordView(); 
    }

    function removeStudent(uid, name) {
        if(confirm(`⚠️ 確定要將「${name}」從系統中完全廢除嗎？成績無法復原。`)) {
            students = students.filter(s => s.uid !== uid);
            saveData(); refreshRecordView(); 
            if(document.getElementById('panel-groups').classList.contains('active')) renderAssignmentList();
        }
    }

    // --- 成績紀錄核心 ---
    function updateGroupFilters() {
        const select = document.getElementById('groupFilter');
        const curr = select.value;
        select.innerHTML = '<option value="">-- 選擇作賽組別 --</option>' + groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        if(curr) select.value = curr;
    }

    // 手動儲存時間或距離 (將文字轉化為系統數字儲存)
    function saveManualResult(uid, val) {
        const evt = document.getElementById('eventSelect').value;
        const num = parseFloat(val);
        const s = students.find(x => x.uid === uid);
        
        if (!isNaN(num) && num > 0) {
            // 如果是跑步(時間)，底層存的是毫秒 (乘以 1000)
            if (evt !== 'softball') {
                s.results[evt] = num * 1000;
            } else {
                // 如果是壘球，直接存距離 (米)
                s.results[evt] = num;
            }
        } else {
            s.results[evt] = null;
        }
        saveData();
        // 更新排行榜，但不用整個重新刷新清單以免干擾正在輸入的老師
        updateLeaderboard(); 
        
        // 更新「最佳紀錄」欄位的顯示
        const resDisplay = document.getElementById(`res-${uid}`);
        if(s.results[evt]) {
            resDisplay.innerText = evt !== 'softball' ? (s.results[evt]/1000).toFixed(3) + ' 秒' : s.results[evt] + ' 米';
            resDisplay.style.color = '#d93025';
        } else {
            resDisplay.innerText = '無';
            resDisplay.style.color = '#888';
        }
    }

    function refreshRecordView() {
        const gId = document.getElementById('groupFilter').value;
        const evt = document.getElementById('eventSelect').value;
        if(!gId) { document.getElementById('recordList').innerHTML = '<tr><td colspan="4" style="text-align:center;">請選擇作賽組別</td></tr>'; document.getElementById('lbList').innerHTML=''; return; }

        document.getElementById('recordList').innerHTML = students.filter(s => s.groupId == gId).map(s => {
            const uid = s.uid;
            const res = s.results[evt];
            const isTime = evt !== 'softball';
            
            // 加入雙模輸入：可以手動輸入框，也可以用計時按鈕
            const control = isTime ? `
                <input type="number" step="0.001" id="input-${uid}" class="input-score" placeholder="秒數" value="${res ? (res/1000).toFixed(3) : ''}" onchange="saveManualResult('${uid}', this.value)"> 秒
                <button class="btn btn-primary" id="start-${uid}" onclick="startTimer('${uid}')" style="margin-left:5px;">計時</button>
                <button class="btn btn-danger" id="stop-${uid}" style="display:none; margin-left:5px;" onclick="stopTimer('${uid}')">停止</button>
                <button class="btn" onclick="resetScore('${uid}')">重置</button>
                <button class="icon-btn" onclick="removeStudent('${uid}', '${s.name}')" title="廢除學生">🗑️</button>
            ` : `
                <input type="number" step="0.01" class="input-score" placeholder="距離" value="${res || ''}" onchange="saveManualResult('${uid}', this.value)"> 米
                <button class="btn" onclick="resetScore('${uid}')" style="margin-left:5px;">重置</button>
                <button class="icon-btn" onclick="removeStudent('${uid}', '${s.name}')" title="廢除學生">🗑️</button>
            `;

            return `<tr>
                <td><strong style="font-size:16px;">${s.name}</strong></td>
                <td>${s.class} (${s.no})</td>
                <td id="res-${uid}" style="color:${res ? '#d93025' : '#888'}; font-weight:bold;">${res ? (isTime ? (res/1000).toFixed(3)+' 秒' : res+' 米') : '無'}</td>
                <td>${control}</td>
            </tr>`;
        }).join('');
        updateLeaderboard();
    }

    function startTimer(uid) {
        if(runningTimers[uid]) return;
        const start = Date.now();
        const inputField = document.getElementById('input-'+uid);
        inputField.disabled = true; // 計時期間鎖定輸入框
        
        runningTimers[uid] = setInterval(() => {
            inputField.value = ((Date.now() - start)/1000).toFixed(3);
        }, 10);
        
        document.getElementById('start-'+uid).style.display = 'none'; 
        document.getElementById('stop-'+uid).style.display = 'inline-block';
    }
    
    function stopTimer(uid) {
        clearInterval(runningTimers[uid]);
        delete runningTimers[uid];
        
        const inputField = document.getElementById('input-'+uid);
        inputField.disabled = false; // 解鎖輸入框
        
        // 抓取停止那一刻框內的時間並儲存
        saveManualResult(uid, inputField.value);
        
        document.getElementById('start-'+uid).style.display = 'inline-block'; 
        document.getElementById('stop-'+uid).style.display = 'none';
    }
    
    function resetScore(uid) { 
        students.find(x => x.uid === uid).results[document.getElementById('eventSelect').value] = null; 
        saveData(); 
        refreshRecordView(); 
    }

    function updateLeaderboard() {
        const gId = document.getElementById('groupFilter').value;
        const evt = document.getElementById('eventSelect').value;
        if(!gId) return;
        let scores = students.filter(s => s.groupId == gId && s.results[evt] !== null);
        
        // 排序規則：跑步(包括 28m)越少時間越好；壘球越遠越好
        scores.sort((a, b) => evt === 'softball' ? b.results[evt] - a.results[evt] : a.results[evt] - b.results[evt]);
        
        document.getElementById('lbList').innerHTML = scores.slice(0, 8).map((s, i) => `
            <tr style="${i===0?'background:#fff59d;font-weight:bold;':''}">
                <td>${i+1}</td><td>${s.name}</td><td>${s.class}</td><td>${evt === 'softball' ? s.results[evt]+' 米' : (s.results[evt]/1000).toFixed(3)+' 秒'}</td>
            </tr>
        `).join('');
    }

    function exportToExcel() {
        const data = students.map(s => {
            const g = groups.find(x => x.id == s.groupId);
            return {
                '班別': s.class, '學號': s.no, '姓名': s.name, '性別': s.gender, '出生日期': s.dob,
                '分配組別': g ? g.name : '未分組',
                '28米跑(秒)': s.results['28m'] ? (s.results['28m']/1000).toFixed(3) : '',
                '60米跑(秒)': s.results['60m'] ? (s.results['60m']/1000).toFixed(3) : '',
                '100米跑(秒)': s.results['100m'] ? (s.results['100m']/1000).toFixed(3) : '',
                '擲壘球(米)': s.results['softball'] || ''
            };
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new(); 
        XLSX.utils.book_append_sheet(wb, ws, "體育成績"); 
        XLSX.writeFile(wb, "智能分組體育成績.xlsx");
    }
</script>
</body>
</html>
