<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業體育分組紀錄系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a73e8; }

        /* 分頁切換 */
        .main-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .nav-btn { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .nav-btn.active { background: #1a73e8; color: white; }

        .panel { display: none; }
        .panel.active { display: block; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; position: sticky; top: 0; }

        /* 組別設定區 */
        .group-config-card { background: #fff3e0; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #ff9800; }
        .group-edit-item { display: inline-block; margin-right: 15px; margin-bottom: 10px; }
        .group-edit-item input { padding: 5px; border-radius: 4px; border: 1px solid #ccc; width: 140px; }

        /* 按鈕樣式 */
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-success { background: #34a853; color: white; }
        .btn-danger { background: #ea4335; color: white; }
        .timer-btn { font-family: monospace; font-weight: bold; font-size: 1.1em; }

        .timer-display { font-family: monospace; font-size: 1.3em; font-weight: bold; color: #d93025; min-width: 90px; display: inline-block; }
        
        .export-section { text-align: right; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 體育成績分組紀錄系統</h1>

    <div class="main-nav">
        <button class="nav-btn active" onclick="showPanel('import')">1. 匯入與導出</button>
        <button class="nav-btn" onclick="showPanel('groups')">2. 組別設定與分組</button>
        <button class="nav-btn" onclick="showPanel('record')">3. 成績紀錄</button>
    </div>

    <div id="panel-import" class="panel active">
        <div style="background: #e3f2fd; padding: 20px; border-radius: 10px;">
            <h3>Excel 匯入</h3>
            <p>請選擇你的學生名單 Excel 檔案 (.xlsx 或 .csv)：</p>
            <input type="file" id="excelInput" accept=".xlsx, .xls, .csv">
            <hr>
            <div id="importStatus">未載入名單</div>
        </div>
        <div class="export-section">
            <button class="btn btn-success" onclick="exportToExcel()">💾 導出所有成績至 Excel</button>
        </div>
    </div>

    <div id="panel-groups" class="panel">
        <div class="group-config-card">
            <h3>修改組別名稱</h3>
            <div id="groupNameEditor">
                </div>
        </div>

        <h3>手動分組 (將學生分配至上述組別)</h3>
        <div style="margin-bottom: 10px;">
            篩選班別：<select id="assignClassFilter" onchange="renderAssignmentList()"></select>
        </div>
        <table>
            <thead>
                <tr><th>班別/學號</th><th>姓名</th><th>性別</th><th>分配組別</th></tr>
            </thead>
            <tbody id="assignmentList"></tbody>
        </table>
    </div>

    <div id="panel-record" class="panel">
        <div style="display: flex; gap: 20px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 10px;">
            <div>項目：<select id="eventSelect" onchange="refreshRecordView()">
                <option value="60m">60米短跑</option>
                <option value="100m">100米短跑</option>
                <option value="softball">擲壘球</option>
            </select></div>
            <div>篩選組別：<select id="groupFilter" onchange="refreshRecordView()"></select></div>
        </div>

        <table id="recordTable">
            <thead>
                <tr><th>姓名</th><th>原班別</th><th>成績</th><th>操作</th></tr>
            </thead>
            <tbody id="recordList"></tbody>
        </table>

        <div style="margin-top: 40px; background: #fff9c4; padding: 20px; border-radius: 10px;">
            <h3 id="lbTitle">🏆 該組別 Top 8</h3>
            <table id="lbTable">
                <thead><tr><th>排名</th><th>姓名</th><th>班別</th><th>成績</th></tr></thead>
                <tbody id="lbList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- 初始化數據 ---
    let students = [];
    let groups = [
        { id: 1, name: '2016年男子組' },
        { id: 2, name: '2017年男子組' },
        { id: 3, name: '2018年男子組' },
        { id: 4, name: '2016年女子組' },
        { id: 5, name: '2017年女子組' },
        { id: 6, name: '2018年女子組' }
    ];
    let runningTimers = {};

    // --- 分頁切換 ---
    function showPanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + panelId).classList.add('active');
        event.target.classList.add('active');
        
        if(panelId === 'groups') renderGroupEditor(), renderAssignmentList();
        if(panelId === 'record') updateGroupFilters(), refreshRecordView();
    }

    // --- Excel 讀取 ---
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet);
            
            students = json.map(row => ({
                class: row['班別'] || '',
                no: row['學號'] || '',
                name: row['中文姓名'] || row['英文姓名'],
                gender: row['性別'] || '',
                groupId: null, // 預設未分組
                results: { '60m': null, '100m': null, 'softball': null }
            }));

            updateClassDropdowns();
            document.getElementById('importStatus').innerText = `已成功載入 ${students.length} 名學生。請前往「分組設定」進行分組。`;
        };
        reader.readAsArrayBuffer(file);
    });

    // --- 組別與分組邏輯 ---
    function renderGroupEditor() {
        const container = document.getElementById('groupNameEditor');
        container.innerHTML = groups.map((g, idx) => `
            <div class="group-edit-item">
                <label>組別 ${idx+1}: </label>
                <input type="text" value="${g.name}" onchange="updateGroupName(${g.id}, this.value)">
            </div>
        `).join('');
    }

    function updateGroupName(id, newName) {
        const g = groups.find(x => x.id === id);
        if(g) g.name = newName;
    }

    function updateClassDropdowns() {
        const classes = [...new Set(students.map(s => s.class))].sort();
        const select = document.getElementById('assignClassFilter');
        select.innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function renderAssignmentList() {
        const cls = document.getElementById('assignClassFilter').value;
        const list = document.getElementById('assignmentList');
        const filtered = students.filter(s => s.class === cls);
        
        list.innerHTML = filtered.map(s => `
            <tr>
                <td>${s.class} (${s.no})</td>
                <td>${s.name}</td>
                <td>${s.gender}</td>
                <td>
                    <select onchange="assignGroup('${s.class}', '${s.no}', this.value)">
                        <option value="">-- 未分組 --</option>
                        ${groups.map(g => `<option value="${g.id}" ${s.groupId == g.id ? 'selected' : ''}>${g.name}</option>`).join('')}
                    </select>
                </td>
            </tr>
        `).join('');
    }

    function assignGroup(cls, no, gId) {
        const student = students.find(s => s.class === cls && s.no === no);
        if(student) student.groupId = gId ? parseInt(gId) : null;
    }

    // --- 成績紀錄邏輯 ---
    function updateGroupFilters() {
        const select = document.getElementById('groupFilter');
        select.innerHTML = '<option value="">-- 選擇組別 --</option>' + 
            groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    }

    function refreshRecordView() {
        const gId = document.getElementById('groupFilter').value;
        const evt = document.getElementById('eventSelect').value;
        const list = document.getElementById('recordList');
        
        if(!gId) { list.innerHTML = '<tr><td colspan="4">請選擇組別</td></tr>'; return; }

        const filtered = students.filter(s => s.groupId == gId);
        list.innerHTML = filtered.map(s => {
            const sId = `${s.class}-${s.no}`;
            const res = s.results[evt];
            const isTime = evt !== 'softball';
            
            let control = isTime ? `
                <span class="timer-display" id="disp-${sId}">${res ? (res/1000).toFixed(3) : '0.000'}</span>
                <button class="btn btn-primary btn-start" id="start-${sId}" onclick="startTimer('${sId}')">開始</button>
                <button class="btn btn-danger" id="stop-${sId}" style="display:none;" onclick="stopTimer('${sId}')">停止</button>
                <button class="btn" onclick="resetScore('${s.class}','${s.no}')">重置</button>
            ` : `
                <input type="number" step="0.01" class="btn" value="${res || ''}" onchange="saveDist('${s.class}','${s.no}',this.value)"> 米
            `;

            return `<tr>
                <td>${s.name}</td>
                <td>${s.class}</td>
                <td id="res-${sId}">${res ? (isTime ? (res/1000).toFixed(3)+'秒' : res+'米') : '無'}</td>
                <td>${control}</td>
            </tr>`;
        }).join('');
        updateLeaderboard();
    }

    // --- 計時器核心 ---
    function startTimer(id) {
        const start = Date.now();
        runningTimers[id] = setInterval(() => {
            document.getElementById('disp-'+id).innerText = ((Date.now() - start)/1000).toFixed(3);
        }, 10);
        document.getElementById('start-'+id).style.display = 'none';
        document.getElementById('stop-'+id).style.display = 'inline-block';
    }

    function stopTimer(id) {
        clearInterval(runningTimers[id]);
        const final = parseFloat(document.getElementById('disp-'+id).innerText) * 1000;
        const [cls, no] = id.split('-');
        const s = students.find(x => x.class === cls && x.no === no);
        s.results[document.getElementById('eventSelect').value] = final;
        refreshRecordView();
    }

    function saveDist(cls, no, val) {
        const s = students.find(x => x.class === cls && x.no === no);
        s.results[document.getElementById('eventSelect').value] = val ? parseFloat(val) : null;
        updateLeaderboard();
    }

    function resetScore(cls, no) {
        const s = students.find(x => x.class === cls && x.no === no);
        s.results[document.getElementById('eventSelect').value] = null;
        refreshRecordView();
    }

    // --- 排行榜 ---
    function updateLeaderboard() {
        const gId = document.getElementById('groupFilter').value;
        const evt = document.getElementById('eventSelect').value;
        const lbList = document.getElementById('lbList');
        if(!gId) return;

        let scores = students.filter(s => s.groupId == gId && s.results[evt] !== null);
        scores.sort((a, b) => evt === 'softball' ? b.results[evt] - a.results[evt] : a.results[evt] - b.results[evt]);

        lbList.innerHTML = scores.slice(0, 8).map((s, i) => `
            <tr>
                <td>${i+1}</td>
                <td>${s.name}</td>
                <td>${s.class}</td>
                <td>${evt === 'softball' ? s.results[evt]+'米' : (s.results[evt]/1000).toFixed(3)+'秒'}</td>
            </tr>
        `).join('');
    }

    // --- Excel 導出 ---
    function exportToExcel() {
        const data = students.map(s => {
            const g = groups.find(x => x.id == s.groupId);
            return {
                '班別': s.class,
                '學號': s.no,
                '姓名': s.name,
                '組別': g ? g.name : '未分組',
                '60米(秒)': s.results['60m'] ? (s.results['60m']/1000).toFixed(3) : '',
                '100米(秒)': s.results['100m'] ? (s.results['100m']/1000).toFixed(3) : '',
                '擲壘球(米)': s.results['softball'] || ''
            };
        });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "成績紀錄");
        XLSX.writeFile(wb, "體育成績匯出.xlsx");
    }
</script>

</body>
</html>
