<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學校體育成績記錄系統 - 專業版</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        
        /* 檔案上傳與篩選區 */
        .config-section { background: #e8f0fe; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
        .config-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.9em; color: #555; }
        select, input[type="file"] { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }

        /* 頁籤導航 */
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border: none; background: none; cursor: pointer; font-size: 16px; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #fafafa; color: #666; text-transform: uppercase; font-size: 0.85em; }

        /* 計時器與按鈕樣式 */
        .timer-display { font-family: 'Courier New', Courier, monospace; font-size: 1.2em; font-weight: bold; color: #d93025; min-width: 80px; display: inline-block; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: 0.2s; margin-right: 5px; }
        .btn-start { background-color: #34a853; color: white; }
        .btn-stop { background-color: #ea4335; color: white; }
        .btn-reset { background-color: #9aa0a6; color: white; }
        .input-score { width: 80px; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }

        /* 排行榜 */
        .leaderboard { margin-top: 40px; padding: 20px; border: 2px solid #fbbc04; border-radius: 10px; background-color: #fffdf7; }
        .leaderboard h2 { margin-top: 0; color: #f29900; display: flex; align-items: center; gap: 10px; }
        .rank-1 { background-color: #ffd70044; font-weight: bold; }

        .empty-state { text-align: center; padding: 40px; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏃‍♂️ 學校運動成績記錄系統</h1>

    <div class="config-section">
        <div class="config-item">
            <label>1. 匯入名單 (Excel 轉出的 CSV)</label>
            <input type="file" id="csvFileInput" accept=".csv">
        </div>
        <div class="config-item">
            <label>2. 選擇班別</label>
            <select id="classFilter" disabled onchange="handleClassChange()">
                <option value="">-- 請先匯入名單 --</option>
            </select>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchEvent('60m')">60米短跑</button>
        <button class="tab-btn" onclick="switchEvent('100m')">100米短跑</button>
        <button class="tab-btn" onclick="switchEvent('softball')">擲壘球</button>
    </div>

    <h2 id="currentEventTitle" style="color: #444;">60米短跑 記錄表</h2>

    <div id="tableContainer">
        <table>
            <thead>
                <tr>
                    <th>學號</th>
                    <th>姓名</th>
                    <th>性別</th>
                    <th>最佳成績</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="studentList">
                <tr><td colspan="5" class="empty-state">請匯入名單並選擇班別以開始</td></tr>
            </tbody>
        </table>
    </div>

    <div class="leaderboard">
        <h2>🏆 全校 Top 8 排行榜 (<span id="leaderboardTitle">60米</span>)</h2>
        <table>
            <thead>
                <tr>
                    <th>排名</th>
                    <th>班別</th>
                    <th>姓名</th>
                    <th>成績</th>
                </tr>
            </thead>
            <tbody id="leaderboardList">
                </tbody>
        </table>
    </div>
</div>

<script>
    let allStudents = [];
    let currentEvent = '60m';
    let currentClass = '';
    let runningTimers = {};

    const eventConfig = {
        '60m': { title: '60米短跑 (秒)', unit: '秒', type: 'time' },
        '100m': { title: '100米短跑 (秒)', unit: '秒', type: 'time' },
        'softball': { title: '擲壘球 (米)', unit: '米', type: 'distance' }
    };

    // --- CSV 處理邏輯 ---
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            parseCSV(text);
        };
        reader.readAsText(file, 'UTF-8');
    });

    function parseCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const students = [];
        const classes = new Set();

        // 跳過標題行，從第二行開始
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            // 處理 CSV 的逗號分隔 (考慮到有些格式可能包含引號，這裡用簡單分割)
            const cols = lines[i].split(',');
            if (cols.length < 4) continue;

            const student = {
                class: cols[0].trim(),
                no: cols[1].trim(),
                enName: cols[2].trim(),
                cnName: cols[3].trim(),
                gender: cols[4].trim(),
                results: { '60m': null, '100m': null, 'softball': null }
            };
            
            students.push(student);
            classes.add(student.class);
        }

        allStudents = students;
        updateClassDropdown(Array.from(classes).sort());
        alert('匯入成功！共載入 ' + students.length + ' 名學生。');
    }

    function updateClassDropdown(classList) {
        const select = document.getElementById('classFilter');
        select.innerHTML = '<option value="">-- 選擇班別 --</option>';
        classList.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.innerText = c;
            select.appendChild(opt);
        });
        select.disabled = false;
    }

    // --- UI 邏輯 ---
    function handleClassChange() {
        currentClass = document.getElementById('classFilter').value;
        renderStudents();
    }

    function switchEvent(eventKey) {
        currentEvent = eventKey;
        document.getElementById('currentEventTitle').innerText = eventConfig[eventKey].title + ' 記錄表';
        document.getElementById('leaderboardTitle').innerText = eventConfig[eventKey].title;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(eventKey === 'softball' ? '擲壘球' : eventKey.replace('m','米')));
        });

        renderStudents();
        updateLeaderboard();
    }

    function formatDisplay(val) {
        if (val === null) return '未有成績';
        return eventConfig[currentEvent].type === 'time' ? (val / 1000).toFixed(3) + ' 秒' : val + ' 米';
    }

    function renderStudents() {
        const tbody = document.getElementById('studentList');
        if (!currentClass) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">請選擇班別</td></tr>';
            return;
        }

        const filtered = allStudents.filter(s => s.class === currentClass);
        tbody.innerHTML = '';

        filtered.forEach((s) => {
            const tr = document.createElement('tr');
            const studentId = `${s.class}-${s.no}`; // 唯一 ID
            
            let actionHTML = '';
            if (eventConfig[currentEvent].type === 'time') {
                actionHTML = `
                    <span class="timer-display" id="disp-${studentId}">0.000</span>
                    <button class="btn btn-start" id="start-${studentId}" onclick="startTimer('${studentId}')">開始</button>
                    <button class="btn btn-stop" id="stop-${studentId}" style="display:none;" onclick="stopTimer('${studentId}')">停止</button>
                    <button class="btn btn-reset" onclick="resetScore('${s.class}', '${s.no}')">重置</button>
                `;
            } else {
                actionHTML = `
                    <input type="number" class="input-score" step="0.01" placeholder="輸入距離" 
                           onchange="saveDistance('${s.class}', '${s.no}', this.value)" value="${s.results[currentEvent] || ''}"> 米
                `;
            }

            tr.innerHTML = `
                <td>${s.no}</td>
                <td>${s.cnName} <br><small>${s.enName}</small></td>
                <td>${s.gender}</td>
                <td id="res-${studentId}">${formatDisplay(s.results[currentEvent])}</td>
                <td>${actionHTML}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 計時與記錄功能 ---
    function startTimer(id) {
        if (runningTimers[id]) return;
        const startTime = Date.now();
        runningTimers[id] = setInterval(() => {
            const elapsed = Date.now() - startTime;
            document.getElementById(`disp-${id}`).innerText = (elapsed / 1000).toFixed(3);
        }, 10);
        
        document.getElementById(`start-${id}`).style.display = 'none';
        document.getElementById(`stop-${id}`).style.display = 'inline-block';
    }

    function stopTimer(id) {
        clearInterval(runningTimers[id]);
        const finalTime = parseFloat(document.getElementById(`disp-${id}`).innerText) * 1000;
        delete runningTimers[id];

        // 尋找學生並更新 (注意：這裡使用 class 和 no 匹配)
        const [cls, no] = id.split('-');
        const student = allStudents.find(s => s.class === cls && s.no === no);
        student.results[currentEvent] = finalTime;

        renderStudents();
        updateLeaderboard();
    }

    function saveDistance(cls, no, val) {
        const student = allStudents.find(s => s.class === cls && s.no === no);
        student.results[currentEvent] = val ? parseFloat(val) : null;
        updateLeaderboard();
    }

    function resetScore(cls, no) {
        const student = allStudents.find(s => s.class === cls && s.no === no);
        student.results[currentEvent] = null;
        renderStudents();
        updateLeaderboard();
    }

    // --- 排行榜 (跨班別 Top 8) ---
    function updateLeaderboard() {
        const list = document.getElementById('leaderboardList');
        list.innerHTML = '';

        let scores = allStudents
            .filter(s => s.results[currentEvent] !== null)
            .sort((a, b) => {
                if (eventConfig[currentEvent].type === 'time') {
                    return a.results[currentEvent] - b.results[currentEvent]; // 時間越短越前
                } else {
                    return b.results[currentEvent] - a.results[currentEvent]; // 距離越長越前
                }
            });

        const top8 = scores.slice(0, 8);
        if (top8.length === 0) {
            list.innerHTML = '<tr><td colspan="4" style="text-align:center;">尚無數據</td></tr>';
            return;
        }

        top8.forEach((s, idx) => {
            const tr = document.createElement('tr');
            if (idx === 0) tr.className = 'rank-1';
            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td>${s.class}</td>
                <td>${s.cnName}</td>
                <td>${formatDisplay(s.results[currentEvent])}</td>
            `;
            list.appendChild(tr);
        });
    }
</script>

</body>
</html>
